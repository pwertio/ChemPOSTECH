<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stipend Checker _by ChemPOSTECH v2.1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .form-container {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.1em;
        }

        .degree-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .degree-option {
            flex: 1;
            padding: 15px;
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .degree-option:hover {
            border-color: #3498db;
            transform: translateY(-2px);
        }

        .degree-option.selected {
            border-color: #3498db;
            background: #ebf3fd;
            color: #2c3e50;
        }

        .degree-option h3 {
            font-size: 1.3em;
            margin-bottom: 5px;
        }

        .degree-option p {
            color: #666;
            font-size: 0.9em;
        }

        .funding-sources {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .funding-item {
            padding: 20px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            background: #fafafa;
            transition: all 0.3s ease;
        }

        .funding-item:hover {
            border-color: #3498db;
            background: #f8fbff;
        }

        .funding-item.excluded {
            border-color: #95a5a6;
            background: #f8f9fa;
        }

        .funding-item.included {
            border-color: #27ae60;
            background: #f2fdf4;
        }

        .funding-label {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tag {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
        }

        .tag.excluded {
            background: #e9ecef;
            color: #6c757d;
        }

        .tag.included {
            background: #efe;
            color: #2b8a3e;
        }

        .funding-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .funding-input:focus {
            outline: none;
            border-color: #3498db;
        }

        .calculate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.3);
        }

        .calculate-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-container.sufficient {
            background: linear-gradient(135deg, #d4edda, #c3e6cb);
            border: 2px solid #27ae60;
        }

        .result-container.insufficient {
            background: linear-gradient(135deg, #f8d7da, #f1b0b7);
            border: 2px solid #e74c3c;
        }

        .result-container.excess {
            background: linear-gradient(135deg, #fff3cd, #ffeaa7);
            border: 2px solid #f39c12;
        }

        .result-container.not-applicable {
            background: linear-gradient(135deg, #e9ecef, #dee2e6);
            border: 2px solid #6c757d;
        }

        .result-title {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-details {
            font-size: 1.1em;
            line-height: 1.6;
        }

        .result-summary {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 12px;
            margin: 15px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 0.9em;
            color: rgba(0,0,0,0.7);
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 1.3em;
            font-weight: bold;
        }

        .summary-value.status {
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
        }

        .summary-value.status.충족 {
            background: #27ae60;
        }

        .summary-value.status.부족 {
            background: #e74c3c;
        }

        .summary-value.status.초과 {
            background: #f39c12;
        }

        .summary-value.status.고려대상아님 {
            background: #6c757d;
        }

        .amount-highlight {
            font-weight: 700;
            font-size: 1.2em;
            padding: 5px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.3);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                margin: 0;
                border-radius: 15px;
            }
            
            .header {
                padding: 20px 15px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .header p {
                font-size: 1em;
            }
            
            .form-container {
                padding: 20px 15px;
            }
            
            .degree-selector {
                flex-direction: column;
                gap: 15px;
            }
            
            .degree-option {
                padding: 20px;
            }
            
            .funding-sources {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .funding-item {
                padding: 15px;
            }
            
            .calculate-btn {
                font-size: 1.1em;
                padding: 16px;
            }
            
            .result-container {
                padding: 20px 15px;
                margin-top: 15px;
            }
            
            .result-title {
                font-size: 1.3em;
            }
            
            .result-details {
                font-size: 1em;
            }

            .result-summary {
                padding: 15px;
                gap: 10px;
                grid-template-columns: 1fr;
            }
            
            .summary-value {
                font-size: 1.1em;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .header p {
                font-size: 0.9em;
            }
            
            .form-container {
                padding: 15px 10px;
            }
            
            .degree-option h3 {
                font-size: 1.2em;
            }
            
            .funding-label {
                font-size: 0.95em;
            }
            
            .funding-input {
                padding: 14px 12px;
                font-size: 16px;
            }
            
            .calculate-btn {
                font-size: 1em;
                padding: 15px;
            }
            
            .amount-highlight {
                font-size: 1.1em;
                display: inline-block;
                margin: 2px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Stipend Checker</h1>
            <p>v1.1 - 포스텍 대학원생 이공계 연구생활장려금 지원 확인 시스템</p>
        </div>
        
        <div class="form-container">
            <div class="form-group">
                <label>📚 학위 과정 선택</label>
                <div class="degree-selector">
                    <div class="degree-option" onclick="selectDegree('master')" id="master">
                        <h3>석사 과정</h3>
                        <p>Stipend 지급가능 최대금액: 80만원</p>
                        <p>산단회계 인정기준금액: 150만원</p>
                    </div>
                    <div class="degree-option" onclick="selectDegree('phd')" id="phd">
                        <h3>박사 과정</h3>
                        <p>Stipend 지급가능 최대금액: 110만원</p>
                        <p>산단회계 인정기준금액: 180만원</p>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>💸 지급 재원별 금액 입력 (단위: 원)</label>
                <div class="funding-sources">
                    <!-- 제외 재원 -->
                    <div class="funding-item excluded">
                        <div class="funding-label">
                            교비장학금 <span class="tag excluded">제외</span>
                        </div>
                        <input type="text" class="funding-input" id="tuition_scholarship" placeholder="0" oninput="formatNumberInput(this)">
                    </div>
                    
                    <div class="funding-item excluded">
                        <div class="funding-label">
                            대학연구비(2.###) <span class="tag excluded">제외</span>
                        </div>
                        <input type="text" class="funding-input" id="university_research" placeholder="0" oninput="formatNumberInput(this)">
                    </div>

                    <!-- 인정 재원 -->
                    <div class="funding-item included">
                        <div class="funding-label">
                            BK장학금(4.###) <span class="tag included">인정</span>
                        </div>
                        <input type="text" class="funding-input" id="bk_scholarship" placeholder="0" oninput="formatNumberInput(this)">
                    </div>
                    
                    <div class="funding-item included">
                        <div class="funding-label">
                            학생인건비(4.###) <span class="tag included">인정</span>
                        </div>
                        <input type="text" class="funding-input" id="student_salary" placeholder="0" oninput="formatNumberInput(this)">
                    </div>
                    
                    <div class="funding-item included">
                        <div class="funding-label">
                            산단연구비(4.###) <span class="tag included">인정</span>
                        </div>
                        <input type="text" class="funding-input" id="industry_research" placeholder="0" oninput="formatNumberInput(this)">
                    </div>
                    
                    <div class="funding-item included">
                        <div class="funding-label">
                            Stipend(4.###) <span class="tag included">인정</span>
                        </div>
                        <input type="text" class="funding-input" id="stipend" placeholder="0" oninput="formatNumberInput(this)">
                    </div>
                    
                    <div class="funding-item included">
                        <div class="funding-label">
                            타기관과제 외부인건비 <span class="tag included">인정</span>
                        </div>
                        <input type="text" class="funding-input" id="external_salary" placeholder="0" oninput="formatNumberInput(this)">
                    </div>
                    
                    <div class="funding-item included">
                        <div class="funding-label">
                            외부장학금 <span class="tag included">인정</span>
                        </div>
                        <input type="text" class="funding-input" id="external_scholarship" placeholder="0" oninput="formatNumberInput(this)">
                    </div>
                </div>
            </div>

            <button class="calculate-btn" onclick="calculateStipend()">
                🧮 Stipend 지급 여부 확인
            </button>

            <div id="result" class="result-container">
                <div class="result-title" id="resultTitle"></div>
                <div class="result-details" id="resultDetails"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedDegree = null;

        function formatNumberInput(input) {
            let value = input.value.replace(/[^\d]/g, '');
            if (value === '') {
                input.value = '';
                return;
            }
            let formattedValue = parseInt(value).toLocaleString('ko-KR');
            input.value = formattedValue;
        }

        function getNumericValue(inputId) {
            const value = document.getElementById(inputId).value.replace(/,/g, '');
            return parseInt(value) || 0;
        }

        function selectDegree(degree) {
            document.querySelectorAll('.degree-option').forEach(option => {
                option.classList.remove('selected');
            });
            document.getElementById(degree).classList.add('selected');
            selectedDegree = degree;
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('ko-KR').format(amount) + '원';
        }

        function calculateStipend() {
            if (!selectedDegree) {
                alert('학위 과정을 선택해주세요.');
                return;
            }

            // 산단회계 인정기준금액 (인정 여부 판단 기준)
            const baseAmounts = {
                master: 1500000,  // 150만원
                phd: 1800000      // 180만원
            };
            const baseAmount = baseAmounts[selectedDegree];

            // Stipend 지급가능 최대금액 (결과 표시용)
            const maxStipendAmounts = {
                master: 800000,   // 80만원
                phd: 1100000      // 110만원
            };
            const maxStipendAmount = maxStipendAmounts[selectedDegree];

            // 학생인건비 최저기준
            const minStudentSalary = {
                master: 220000,  // 22만원
                phd: 300000      // 30만원
            };

            // 입력값 수집
            const data = {
                tuitionScholarship: getNumericValue('tuition_scholarship'),
                universityResearch: getNumericValue('university_research'),
                bkScholarship: getNumericValue('bk_scholarship'),
                studentSalary: getNumericValue('student_salary'),
                industryResearch: getNumericValue('industry_research'),
                stipend: getNumericValue('stipend'),
                externalSalary: getNumericValue('external_salary'),
                externalScholarship: getNumericValue('external_scholarship')
            };

            // 유효성 검사 1: 학생인건비 최저기준 체크
            if (data.studentSalary > 0 && data.studentSalary < minStudentSalary[selectedDegree]) {
                alert('학생인건비 최저 지급기준을 다시 살펴보세요');
                return;
            }

            // 인정 재원 합계 계산
            const recognizedTotal = 
                data.bkScholarship +
                data.studentSalary +
                data.industryResearch +
                data.stipend +
                data.externalSalary +
                data.externalScholarship;

            // 유효성 검사 2: Stipend만으로 지급하거나 제외재원+Stipend만으로 지급하는 경우
            const recognizedWithoutStipend = recognizedTotal - data.stipend;
            const hasExcludedSources = data.tuitionScholarship > 0 || data.universityResearch > 0;
            
            if (data.stipend > 0 && recognizedWithoutStipend === 0) {
                alert('연구과제 지급금액을 다시 확인바랍니다');
                return;
            }
            
            if (data.stipend > 0 && recognizedWithoutStipend === 0 && hasExcludedSources) {
                alert('연구과제 지급금액을 다시 확인바랍니다');
                return;
            }

            // 수정된 판정 로직
            let status, adjustmentAmount, message, icon, resultClass;
            
            // 1. 인정재원 합계가 0원인 경우 - '고려대상 아님'
            if (recognizedTotal === 0) {
                status = '고려대상아님';
                adjustmentAmount = 0;
                icon = '🚫';
                resultClass = 'not-applicable';
                message = `<p><strong>현재 인정 재원의 합계가 0원입니다.</strong></p>
                          <p>연구생활장려금 지원 고려대상이 아닙니다.</p>`;
            }
            // 2. Stipend(4.###)가 0원이고 다른 인정재원이 기준금액 이상인 경우 - '충족'
            else if (data.stipend === 0 && recognizedTotal >= baseAmount) {
                status = '충족';
                adjustmentAmount = recognizedTotal - baseAmount;
                icon = '✅';
                resultClass = 'sufficient';
                if (recognizedTotal === baseAmount) {
                    message = `<p><strong>Stipend 지급 없이 기준 금액을 정확히 충족합니다.</strong></p>
                              <p>추가 Stipend 지급이 필요하지 않습니다.</p>`;
                } else {
                    message = `<p><strong>Stipend 지급 없이 기준 금액을 충족합니다.</strong></p>
                              <p>기준 금액 초과분: ${formatCurrency(adjustmentAmount)}</p>`;
                }
            }
            // 3. 일반적인 경우들
            else if (recognizedTotal === baseAmount) {
                status = '충족';
                adjustmentAmount = 0;
                icon = '✅';
                resultClass = 'sufficient';
                message = `<p><strong>기준 금액을 정확히 충족합니다.</strong></p>
                          <p>추가 Stipend 지급이 필요하지 않습니다.</p>`;
            } else if (recognizedTotal > baseAmount) {
                status = '초과';
                adjustmentAmount = recognizedTotal - baseAmount;
                icon = '⚠️';
                resultClass = 'excess';
                message = `<p><strong>현재 인정 재원 합계가 기준 금액을 초과합니다.</strong></p>
                          <p class="amount-highlight">조정 필요 금액: -${formatCurrency(adjustmentAmount)}</p>`;
                alert('지급액이 기준을 초과했습니다. 조정 필요 금액: ' + formatCurrency(adjustmentAmount));
            } else {
                status = '부족';
                adjustmentAmount = baseAmount - recognizedTotal;
                icon = '🚨';
                resultClass = 'insufficient';
                message = `<p><strong>기준 금액에 미달합니다. 추가 지원이 필요합니다.</strong></p>
                          <p class="amount-highlight">조정 필요 금액: +${formatCurrency(adjustmentAmount)}</p>`;
                alert('지급액이 기준에 부족합니다. 조정 필요 금액: ' + formatCurrency(adjustmentAmount));
            }

            // 결과 표시
            displayResult({
                status: status,
                baseAmount: baseAmount,
                maxStipendAmount: maxStipendAmount,
                recognizedTotal: recognizedTotal,
                adjustmentAmount: adjustmentAmount,
                message: message,
                icon: icon,
                resultClass: resultClass
            });
        }

        function displayResult(result) {
            const resultContainer = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultDetails = document.getElementById('resultDetails');
            
            // 클래스 초기화 및 적용
            resultContainer.className = 'result-container ' + result.resultClass;
            
            resultTitle.innerHTML = `${result.icon} ${result.status === '충족' ? 'Stipend 지급 충족' : 
                                   result.status === '부족' ? 'Stipend 추가 지급 필요' : 
                                   result.status === '고려대상아님' ? '연구생활장려금 지원 고려대상 아님' : 
                                   'Stipend 금액 조정 필요'}`;
            
            // 요약 정보 생성
            let summaryHtml = `
                <div class="result-summary">
                    <div class="summary-item">
                        <div class="summary-label">판정 결과</div>
                        <div class="summary-value status ${result.status}">${result.status}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">산단회계 인정기준금액</div>
                        <div class="summary-value">${formatCurrency(result.baseAmount)}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">Stipend 지급가능 최대금액</div>
                        <div class="summary-value">${formatCurrency(result.maxStipendAmount)}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">인정 재원 합계</div>
                        <div class="summary-value">${formatCurrency(result.recognizedTotal)}</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-label">조정 필요 금액</div>
                        <div class="summary-value" style="color: ${result.status === '충족' || result.status === '고려대상아님' ? '#27ae60' : 
                                                                   result.status === '부족' ? '#e74c3c' : '#f39c12'}">
                            ${result.status === '충족' ? '없음' : (result.adjustmentAmount > 0 ? formatCurrency(result.adjustmentAmount) : '없음')}
                        </div>
                    </div>
                </div>
            `;
            
            let detailsHtml = summaryHtml + result.message;
            
            resultDetails.innerHTML = detailsHtml;
            resultContainer.style.display = 'block';
            
            // 결과 영역으로 부드럽게 스크롤
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
